<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: dashboard dark green with rounded corners -->
  <rect width="512" height="512" rx="112" fill="#223022"/>

  <!-- Soccer ball: cream base circle -->
  <circle cx="256" cy="256" r="160" fill="#F0EBE0"/>

  <!-- Classic soccer ball black patches -->
  <!-- Central pentagon (top) -->
  <polygon points="256,120 292,148 278,190 234,190 220,148" fill="#1B2B1B"/>
  <!-- Pentagon bottom-left -->
  <polygon points="136,208 172,196 186,238 158,268 120,254" fill="#1B2B1B"/>
  <!-- Pentagon bottom-right -->
  <polygon points="376,208 340,196 326,238 354,268 392,254" fill="#1B2B1B"/>
  <!-- Pentagon bottom-center-left -->
  <polygon points="190,344 198,300 240,296 258,334 232,362" fill="#1B2B1B"/>
  <!-- Pentagon bottom-center-right -->
  <polygon points="322,344 314,300 272,296 254,334 280,362" fill="#1B2B1B"/>

  <!-- Ball outline -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#1B2B1B" stroke-width="6" opacity="0.25"/>
</svg>
